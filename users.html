<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Membros — Daily Stand-up Bot</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    .users-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 16px;
    }

    .user-card {
      background: #16213e;
      border: 1px solid #0f3460;
      border-radius: 12px;
      padding: 20px;
      display: flex;
      align-items: center;
      gap: 16px;
      transition: border-color 0.15s;
    }

    .user-card:hover { border-color: #5865f2; }

    .user-card img {
      width: 52px;
      height: 52px;
      border-radius: 50%;
      border: 2px solid #5865f2;
      flex-shrink: 0;
    }

    .user-card-info { flex: 1; min-width: 0; }
    .user-card-info strong { color: #fff; display: block; font-size: 0.95rem; }
    .user-card-info span {
      color: #6b7280;
      font-size: 0.78rem;
      display: block;
      margin-top: 2px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .badge-active {
      font-size: 0.7rem;
      background: #0f4620;
      color: #4ade80;
      border: 1px solid #22c55e;
      border-radius: 4px;
      padding: 2px 7px;
      margin-top: 5px;
      display: inline-block;
    }

    .badge-inactive {
      font-size: 0.7rem;
      background: #3d1515;
      color: #f87171;
      border: 1px solid #7b2020;
      border-radius: 4px;
      padding: 2px 7px;
      margin-top: 5px;
      display: inline-block;
    }

    .mgmt-note {
      background: #0f3460;
      border-left: 3px solid #5865f2;
      padding: 12px 16px;
      border-radius: 8px;
      margin-bottom: 24px;
      font-size: 0.85rem;
      color: #c9d1d9;
      line-height: 1.5;
    }
    .mgmt-note code {
      background: #06170c;
      color: #86efac;
      padding: 1px 6px;
      border-radius: 4px;
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      font-size: 0.85em;
    }
  </style>
</head>
<body data-page="users">

  <nav>
    <a href="dashboard.html" class="nav-brand">📋 Daily Bot</a>
    <div class="nav-links">
      <a href="dashboard.html">Dashboard</a>
      <a href="register.html">Registrar</a>
      <a href="users.html" class="active">Membros</a>
    </div>
    <div class="nav-actions">
      <a href="index.html" class="btn-logout" onclick="sessionStorage.removeItem('dailybot_auth'); return true;">Sair ✕</a>
    </div>
  </nav>

  <div class="container">
    <h1>Membros Registrados</h1>
    <p class="page-subtitle" id="subtitle">Carregando...</p>

    <div class="mgmt-note">
      💡 Gestão de membros acontece pelo bot no Discord.
      Pra <strong>registrar</strong>, use a página <a href="register.html" style="color:#5865f2;">Registrar</a>.
      Pra <strong>desativar/reativar</strong>, mande DM pro bot com o comando adequado.
    </div>

    <div id="content"></div>
  </div>

  <script src="app.js"></script>
  <script>
    async function loadUsers() {
      const content = document.getElementById('content');
      content.innerHTML = '<div class="loading"><div class="spinner"></div><p>Carregando membros...</p></div>';

      try {
        const usersData = await fetchPath('users');
        const users = usersData.users || [];

        document.getElementById('subtitle').textContent =
          `${users.length} membro${users.length !== 1 ? 's' : ''} registrado${users.length !== 1 ? 's' : ''}`;

        if (users.length === 0) {
          content.innerHTML = `
            <div class="empty-state boxed">
              <div class="icon">👥</div>
              <p>Nenhum membro registrado ainda.<br>
              <a href="register.html" style="color:#5865f2;">Registre o primeiro membro</a></p>
            </div>`;
          return;
        }

        const sorted = [...users].sort((a, b) => a.username.localeCompare(b.username));
        let html = '<div class="users-grid">';
        for (const u of sorted) {
          const badge = u.active !== false
            ? '<span class="badge-active">● Ativo</span>'
            : '<span class="badge-inactive">● Inativo</span>';

          const joined = u.createdAt
            ? new Date(u.createdAt).toLocaleDateString('pt-BR', { timeZone: 'UTC' })
            : '—';

          html += `
            <div class="user-card">
              <img src="${avatarURL(u)}" alt="${escapeHtml(u.username)}" />
              <div class="user-card-info">
                <strong>${escapeHtml(u.username)}</strong>
                <span>ID: ${escapeHtml(u.discordId)}</span>
                <span>Registrado em: ${joined}</span>
                ${badge}
              </div>
            </div>`;
        }
        html += '</div>';
        content.innerHTML = html;
      } catch (err) {
        content.innerHTML = `<div class="empty-state boxed"><div class="icon">⚠️</div><p>Erro ao carregar membros.<br>${escapeHtml(err.message)}</p></div>`;
      }
    }

    if (requireAuth()) loadUsers();
  </script>
</body>
</html>
