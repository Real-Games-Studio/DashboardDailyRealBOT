name: Bot Watchdog

on:
  schedule:
    - cron: '*/5 * * * *'   # a cada 5 minutos
  workflow_dispatch:          # permite rodar manualmente pelo painel do GitHub

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checar status e reiniciar se offline
        env:
          DISCLOUD_TOKEN: ${{ secrets.DISCLOUD_TOKEN }}
          DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
        run: |
          python3 << 'EOF'
          import os
          import sys
          import requests
          from datetime import datetime, timezone

          DISCLOUD_TOKEN    = os.environ["DISCLOUD_TOKEN"]
          DISCORD_BOT_TOKEN = os.environ["DISCORD_BOT_TOKEN"]
          APP_ID            = "1776184151523"
          OWNER_ID          = "287048260655382529"

          def ts():
              return datetime.now(timezone.utc).strftime("%d/%m/%Y às %H:%M UTC")

          def send_dm(text):
              r = requests.post(
                  "https://discord.com/api/v10/users/@me/channels",
                  headers={"Authorization": f"Bot {DISCORD_BOT_TOKEN}", "Content-Type": "application/json"},
                  json={"recipient_id": OWNER_ID},
                  timeout=10,
              )
              if r.status_code not in (200, 201):
                  print(f"[DM] Erro ao abrir canal: {r.status_code} {r.text}")
                  return
              channel_id = r.json()["id"]
              r2 = requests.post(
                  f"https://discord.com/api/v10/channels/{channel_id}/messages",
                  headers={"Authorization": f"Bot {DISCORD_BOT_TOKEN}", "Content-Type": "application/json"},
                  json={"content": text},
                  timeout=10,
              )
              print(f"[DM] Enviada: {r2.status_code}")

          # ── Checar status no Discloud ──────────────────────────────────
          try:
              res = requests.get(
                  f"https://api.discloud.app/v2/app/{APP_ID}",
                  headers={"api-token": DISCLOUD_TOKEN},
                  timeout=10,
              )
          except Exception as e:
              print(f"[Watchdog] Falha ao chamar Discloud API: {e}")
              sys.exit(0)

          if res.status_code != 200:
              print(f"[Watchdog] Resposta inesperada: {res.status_code} {res.text}")
              sys.exit(0)

          data = res.json()
          # Discloud retorna o app diretamente em "apps"
          app = data.get("app") or data.get("apps", {})
          online = app.get("online", False)

          is_online = online is True

          print(f"[Watchdog] Status: online={online!r} → {'✅ OK' if is_online else '❌ OFFLINE'}")

          if is_online:
              sys.exit(0)

          # ── Bot offline: reinicia ──────────────────────────────────────
          print("[Watchdog] Bot offline! Enviando restart...")
          try:
              r_restart = requests.put(
                  f"https://api.discloud.app/v2/app/{APP_ID}/restart",
                  headers={"api-token": DISCLOUD_TOKEN},
                  timeout=15,
              )
              print(f"[Watchdog] Restart: {r_restart.status_code} {r_restart.text}")
          except Exception as e:
              print(f"[Watchdog] Falha ao chamar restart: {e}")

          # Poll pós-restart: confirma que voltou online de fato (não confia só no 200 do PUT)
          import time
          came_back = False
          for attempt in range(1, 5):  # 4 tentativas × 15s = até 60s
              time.sleep(15)
              try:
                  r2 = requests.get(
                      f"https://api.discloud.app/v2/app/{APP_ID}",
                      headers={"api-token": DISCLOUD_TOKEN},
                      timeout=10,
                  )
                  if r2.status_code == 200:
                      d2 = r2.json()
                      app2 = d2.get("app") or d2.get("apps", {})
                      on2 = app2.get("online", False)
                      print(f"[Watchdog] Poll {attempt}/4: online={on2!r}")
                      if on2 is True:
                          came_back = True
                          break
                  else:
                      print(f"[Watchdog] Poll {attempt}/4 status inesperado: {r2.status_code}")
              except Exception as e:
                  print(f"[Watchdog] Poll {attempt}/4 erro: {e}")

          # ── Notifica no Discord ───────────────────────────────────────
          if came_back:
              msg = (
                  f"⚠️ **DailyInBot caiu e foi reiniciado automaticamente.**\n"
                  f"🕐 {ts()}\n"
                  f"_Verifique os logs no Discloud para entender o motivo._"
              )
          else:
              msg = (
                  f"🚨 **DailyInBot caiu e NÃO voltou após 60s de tentativa.**\n"
                  f"🕐 {ts()}\n"
                  f"_Entre no Discloud e investigue manualmente._"
              )

          send_dm(msg)
          EOF
